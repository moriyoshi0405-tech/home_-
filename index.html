<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
padding:20px;
}

.grid{
display:grid;
grid-template-columns: repeat(3, 1fr);
gap:12px;
}

.card{
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:180px;
position:relative;
overflow:hidden;
}

.text{
font-size:12px;
text-align:center;
line-height:1.4;
opacity:0;
transform:translateY(10px);
transition:.5s;
}

.text.show{
opacity:1;
transform:translateY(0);
}

.title{
position:absolute;
bottom:6px;
font-size:10px;
opacity:.6;
}

</style>
</head>

<body>

<div class="grid" id="grid"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzQ8_J-Pyj-qC5nq6GRl1VNVRUuGziXYCnPIGJAssycvoCEeIVtvOPlKWTtp6Svg_qd/exec";

fetch(API_URL)
.then(res => res.json())
.then(data => {

  const grid = document.getElementById("grid");

  data.slice(0,6).forEach(item => {

    const card = document.createElement("div");
    card.className = "card";

    const text = document.createElement("div");
    text.className = "text";

    const title = document.createElement("div");
    title.className = "title";
    title.innerText = item.title;

    card.appendChild(text);
    card.appendChild(title);
    grid.appendChild(card);

    createReel(text, item.reel);

  });

});


// 🎬 リール生成関数（ここが核心）
function createReel(textEl, scenes){

  let index = 0;

  function show(){

    textEl.classList.remove("show");

    setTimeout(()=>{

      textEl.innerHTML = scenes[index] || "";
      textEl.classList.add("show");

      index++;

      if(index >= scenes.length){
        index = 0; // ループ
      }

    },200);

  }

  show();
  setInterval(show, 3000);

}

</script>

</body>
</html>
