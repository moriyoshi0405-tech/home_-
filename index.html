<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">

<style>

/* 🌿 全体 */
body{
margin:0;
font-family:'Zen Maru Gothic',sans-serif;
background:#ffffff;
color:#333;
}

/* 🌿 ヘッダー（黒 → 白） */
.header{
text-align:center;
padding:50px 20px 30px;
background: linear-gradient(180deg, #111 0%, #ffffff 100%);
color:white;
}

.header h1{
font-size:26px;
font-weight:700;
margin:0;
letter-spacing:1px;
}

.header p{
font-size:14px;
opacity:.8;
margin-top:8px;
}

/* 🌿 メイン */
.container{
max-width:900px;
margin:-20px auto 0;
padding:10px 20px 40px;
}

/* 🌿 グリッド */
.grid{
display:grid;
grid-template-columns: repeat(3, 1fr);
gap:16px;
}

/* 🌿 カード */
.card{
background:white;
border-radius:14px;
padding:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
height:230px;
position:relative;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 14px 35px rgba(0,0,0,0.15);
}

/* 🌿 表紙 */
.cover{
width:70px;
border-radius:6px;
margin-bottom:6px;
}

/* 🌿 テキスト */
.title{
font-size:12px;
font-weight:bold;
}

.author{
font-size:10px;
opacity:.6;
margin-bottom:6px;
}

/* 🌿 ボタン */
.button{
font-size:10px;
padding:6px 10px;
border-radius:20px;
background:#222;
color:white;
text-decoration:none;
margin-top:4px;
display:inline-block;
transition:.2s;
}

.button:hover{
background:#444;
}

.subbtn{
font-size:10px;
margin-top:6px;
cursor:pointer;
opacity:.6;
}

.subbtn:hover{
opacity:1;
}

/* 🌿 リールテキスト */
.text{
font-size:12px;
line-height:1.5;
opacity:0;
transform:translateY(10px);
transition:.5s;
}

.text.show{
opacity:1;
transform:translateY(0);
}

/* 🌿 フッター（白 → 黒） */
.footer{
text-align:center;
padding:40px 20px 60px;
background: linear-gradient(180deg, #ffffff 0%, #111 100%);
}

.footer a{
display:inline-block;
padding:10px 20px;
border-radius:25px;
background:#222;
color:white;
text-decoration:none;
font-size:14px;
transition:.2s;
}

.footer a:hover{
background:#444;
}

</style>
</head>

<body>

<!-- 🌿 ヘッダー -->
<div class="header">
  <h1>本との出会いは、たった30秒で変わる</h1>
  <p>読む前に、ちょっとだけ覗いてみる。</p>
</div>

<!-- 🌿 メイン -->
<div class="container">
  <div class="grid" id="grid"></div>
</div>

<!-- 🌿 フッター -->
<div class="footer">
  <a href="ここに一覧ページURL">他の本も見る</a>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzQ8_J-Pyj-qC5nq6GRl1VNVRUuGziXYCnPIGJAssycvoCEeIVtvOPlKWTtp6Svg_qd/exec";

fetch(API_URL)
.then(res => res.json())
.then(data => {

  const grid = document.getElementById("grid");

  data.slice(0,6).forEach(item => {

    const card = document.createElement("div");
    card.className = "card";

    grid.appendChild(card);

    createReelCard(card, item);

  });

});

function createReelCard(card, item){

  let index = 0;
  let interval = null;

  function showIntro(){

    clearInterval(interval);

    card.innerHTML = `
      <img src="${item.image}" class="cover">
      <div class="title">${item.title}</div>
      <div class="author">${item.author}</div>

      <a href="${item.url}" target="_blank" class="button">
        感想記事を読む
      </a>

      <div class="subbtn">▶ 短い紹介を見る</div>
    `;

    card.querySelector(".subbtn").onclick = startReel;

  }

  function startReel(){

    const text = document.createElement("div");
    text.className = "text";
    card.innerHTML = "";
    card.appendChild(text);

    index = 0;

    function show(){

      text.classList.remove("show");

      setTimeout(()=>{

        text.innerHTML = item.reel[index] || "";
        text.classList.add("show");

        index++;

        if(index >= item.reel.length){
          clearInterval(interval);
          setTimeout(showIntro, 1500);
        }

      },200);

    }

    show();
    interval = setInterval(show, 3000);

  }

  showIntro();

}

</script>

</body>
</html>
