<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">

<style>

/* 🌿 全体 */
body{
margin:0;
font-family:'Zen Maru Gothic',sans-serif;
background:#ffffff;
color:#333;
}

/* 🌿 ヘッダー */
.header{
text-align:center;
padding:50px 20px 30px;
background: linear-gradient(180deg, #111 0%, #ffffff 100%);
color:white;
}

.header h1{
font-size:26px;
font-weight:700;
margin:0;
}

.header p{
font-size:14px;
opacity:.8;
margin-top:8px;
}

/* 🌿 メイン */
.container{
max-width:900px;
margin:-20px auto 0;
padding:10px 20px 30px;
}

/* 🌿 グリッド */
.grid{
display:grid;
gap:16px;
}

/* 📱 スマホ：2列固定 */
@media (max-width: 767px){
.grid{
grid-template-columns: repeat(2, 1fr);
}
}

/* 🖥 PC：3列固定 */
@media (min-width: 768px){
.grid{
grid-template-columns: repeat(3, 1fr);
}
}

/* 🌿 カード */
.card{
background:white;
border-radius:14px;
padding:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
height:180px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-3px);
}

/* 🌿 表紙 */
.cover{
width:60px;
border-radius:6px;
margin-bottom:6px;
}

/* 🌿 テキスト */
.title{
font-size:11px;
font-weight:bold;
}

.author{
font-size:9px;
opacity:.6;
margin-bottom:6px;
}

/* 🌿 ボタン */
.button{
font-size:9px;
padding:5px 8px;
border-radius:20px;
background:#222;
color:white;
text-decoration:none;
margin-top:4px;
display:inline-block;
}

.subbtn{
font-size:9px;
margin-top:6px;
cursor:pointer;
opacity:.6;
}

/* 🌿 リール */
.text{
font-size:11px;
line-height:1.4;
opacity:0;
transform:translateY(10px);
transition:.5s;
}

.text.show{
opacity:1;
transform:translateY(0);
}

/* 🌿 フッター */
.footer{
text-align:center;
padding:40px 20px 60px;
background: linear-gradient(180deg, #ffffff 0%, #111 100%);
}

.footer a{
display:inline-block;
padding:10px 20px;
border-radius:25px;
background:#222;
color:white;
text-decoration:none;
font-size:14px;
}

/* 🌿 Markdown装飾 */
.big{
  font-size:18px;
  font-weight:700;
  line-height:1.4;
}

.em{
  font-weight:700;
  color:#ff6b6b;
}

</style>
</head>

<body>

<!-- ヘッダー -->
<div class="header">
  <h1>本との出会いは、たった30秒で変わる</h1>
  <p>読む前に、ちょっとだけ覗いてみる。</p>
</div>

<!-- メイン -->
<div class="container">
  <div class="grid" id="grid"></div>
</div>

<!-- フッター -->
<div class="footer">
  <a href="ここに一覧ページURL">他の本も見る</a>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzQ8_J-Pyj-qC5nq6GRl1VNVRUuGziXYCnPIGJAssycvoCEeIVtvOPlKWTtp6Svg_qd/exec";

fetch(API_URL)
.then(res => res.json())
.then(data => {

  const grid = document.getElementById("grid");

  // 🔥 表示数制御（スマホ4件 / PC6件）
  const isMobile = window.innerWidth <= 767;
  const displayCount = isMobile ? 4 : 6;

  data.slice(0, displayCount).forEach(item => {

    const card = document.createElement("div");
    card.className = "card";

    grid.appendChild(card);

    createReelCard(card, item);

  });

});

function createReelCard(card, item){

  let index = 0;
  let interval = null;

  function showIntro(){

    clearInterval(interval);

    card.innerHTML = `
      <img src="${item.image}" class="cover">
      <div class="title">${item.title}</div>
      <div class="author">${item.author}</div>

      <a href="${item.url}" target="_blank" class="button">
        感想記事を読む
      </a>

      <div class="subbtn">▶ 短い紹介を見る</div>
    `;

    card.querySelector(".subbtn").onclick = startReel;

  }

  function startReel(){

    const text = document.createElement("div");
    text.className = "text";
    card.innerHTML = "";
    card.appendChild(text);

    index = 0;

    function show(){

      text.classList.remove("show");

      setTimeout(()=>{

        text.innerHTML = item.reel[index] || "";
        text.classList.add("show");

        index++;

        if(index >= item.reel.length){
          clearInterval(interval);
          setTimeout(showIntro, 1500);
        }

      },200);

    }

    show();
    interval = setInterval(show, 3000);

  }

  showIntro();

}

function convertMarkdown(text){

  if(!text) return "";

  // HTMLエスケープ
  text = text.replace(/</g,"&lt;").replace(/>/g,"&gt;");

  // # 見出し
  text = text.replace(/^# (.*)$/gm,'<div class="big">$1</div>');

  // **強調**
  text = text.replace(/\*\*(.*?)\*\*/g,'<span class="em">$1</span>');

  // 改行
  text = text.replace(/\n/g,"<br>");

  return text;
}  

</script>

</body>
</html>
