<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">

<style>

/* 🌿 全体 */
body{
margin:0;
font-family:'Zen Maru Gothic',sans-serif;
background:#ffffff;
color:#333;
}

/* 🌿 ヘッダー */
.header{
  text-align:center;
  padding:80px 20px 60px;
  color:#2f3e2f;
  background: linear-gradient(180deg, #e6f4ea 0%, #ffffff 100%);
}

/* 🌿 コンテナ */
.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* 🔍 検索 */
.search input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

/* 🏷 タグ */
.tags{ margin:10px 0; }

.tag{
display:inline-block;
padding:4px 8px;
margin:3px;
border-radius:12px;
background:#eee;
font-size:10px;
cursor:pointer;
}

.tag.active{
background:#222;
color:#fff;
}

/* 🌿 グリッド */
.grid{
display:grid;
gap:16px;
}

/* 📱 スマホ：2列固定 */
@media (max-width: 767px){
.grid{
grid-template-columns: repeat(2, 1fr);
}
}

/* 🖥 PC：3列固定 */
@media (min-width: 768px){
.grid{
grid-template-columns: repeat(3, 1fr);
}
}

/* 🌿 カード */
.card{
background:white;
border-radius:14px;
padding:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
height:180px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

/* 🆕 */
.new{
position:absolute;
top:8px;
left:8px;
background:#ff4d4d;
color:#fff;
font-size:9px;
padding:2px 6px;
border-radius:6px;
}

/* 表紙 */
.cover{
width:60px;
border-radius:6px;
margin-bottom:6px;
}

/* テキスト */
.title{ font-size:11px;font-weight:bold; }
.author{ font-size:9px;opacity:.6;margin-bottom:6px; }

/* ボタン */
.button{
font-size:9px;
padding:5px 8px;
border-radius:20px;
background:#222;
color:white;
text-decoration:none;
margin-top:4px;
}

.subbtn{
font-size:9px;
margin-top:6px;
cursor:pointer;
opacity:.6;
}

/* リール */
.text{
font-size:11px;
line-height:1.4;
opacity:0;
transform:translateY(10px);
transition:.5s;
}

.text.show{
opacity:1;
transform:translateY(0);
}

/* 並び替え */
.sort-btn{
padding:6px 12px;
border:none;
border-radius:20px;
background:#eee;
cursor:pointer;
font-size:11px;
}

.sort-btn.active{
background:#222;
color:#fff;
}

/* もっと見る */
.more{
text-align:center;
margin-top:30px;
}

.more a{
display:inline-block;
padding:10px 20px;
border-radius:30px;
background:#222;
color:#fff;
text-decoration:none;
font-size:12px;
}

</style>
</head>

<body>

<div class="header">
  <h1>物語の世界を、少しだけのぞいてみる</h1>
  <p>気になる一冊が、きっと見つかる</p>
</div>

<div class="container">

  <div class="search">
    <input id="search" placeholder="作品名/著者で本を検索...">
  </div>

  <div style="margin-bottom:10px;">
    <button id="sortBtn" class="sort-btn">新しい順にする</button>
  </div>

  <div id="tags" class="tags"></div>

  <div class="grid" id="grid"></div>

  <!-- 👇 修正済み：新しいタブで開く -->
  <div class="more">
    <a href="https://moriyoshi0405-tech.github.io/reel_All/" target="_blank">
      もっと見る →
    </a>
  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzQ8_J-Pyj-qC5nq6GRl1VNVRUuGziXYCnPIGJAssycvoCEeIVtvOPlKWTtp6Svg_qd/exec";

let allData = [];
let activeTag = null;
let sortMode = "default";

// 👇 表示数（グリッドに最適化）
function getLimit(){
  return window.innerWidth < 768 ? 4 : 6; // スマホ2列×2行 / PC3列×2行
}

fetch(API_URL)
.then(res => res.json())
.then(data => {

  allData = data;

  renderTags(data);
  filter();

});

// 並び替え
document.getElementById("sortBtn").onclick = () => {

  sortMode = sortMode === "default" ? "new" : "default";

  const btn = document.getElementById("sortBtn");

  if(sortMode === "new"){
    btn.textContent = "表示順に戻す";
    btn.classList.add("active");
  }else{
    btn.textContent = "新しい順にする";
    btn.classList.remove("active");
  }

  filter();
};

// 検索
document.getElementById("search").addEventListener("input", filter);

// タグ生成
function renderTags(data){

  const box = document.getElementById("tags");
  const set = new Set();

  data.forEach(d => d.tags.forEach(t => set.add(t)));

  set.forEach(tag => {

    const el = document.createElement("span");
    el.className = "tag";
    el.textContent = tag;

    el.onclick = ()=>{
      activeTag = activeTag === tag ? null : tag;

      document.querySelectorAll(".tag").forEach(t=>t.classList.remove("active"));
      if(activeTag) el.classList.add("active");

      filter();
    };

    box.appendChild(el);
  });
}

// フィルター
function filter(){

  const keyword = document.getElementById("search").value.toLowerCase();

  let filtered = allData.filter(item => {

    const text = (item.title + item.author).toLowerCase();

    const matchText = text.includes(keyword);
    const matchTag = !activeTag || item.tags.includes(activeTag);

    return matchText && matchTag;

  });

  if(sortMode === "new"){
    filtered.sort((a,b)=> new Date(b.created) - new Date(a.created));
  }else{
    filtered.sort((a,b)=> a.order - b.order);
  }

  const limited = filtered.slice(0, getLimit());

  render(limited);
}

// リサイズ対応
window.addEventListener("resize", filter);

// 描画
function render(data){

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(item => {

    const card = document.createElement("div");
    card.className = "card";

    grid.appendChild(card);
    createReelCard(card, item);

  });

}

// リール
function createReelCard(card, item){

  let index = 0;
  let interval = null;

  function showIntro(){
  
    clearInterval(interval);
  
    const isNew = item.created &&
      ((Date.now() - new Date(item.created)) / (1000*60*60*24) <= 7);
  
    card.innerHTML = `
      ${isNew ? '<div class="new">New!</div>' : ''}
      <img src="${item.image}" class="cover">
      <div class="title">${item.title}</div>
      <div class="author">${item.author}</div>
      <a href="${item.url}" target="_blank" class="button">
        感想記事を読む
      </a>
      <div class="subbtn">▶ 短い紹介を見る</div>
    `;
  
    card.querySelector(".subbtn").onclick = startReel;
  }

  function startReel(){

    const text = document.createElement("div");
    text.className = "text";
    card.innerHTML = "";
    card.appendChild(text);

    index = 0;

    function show(){

      text.classList.remove("show");

      setTimeout(()=>{

        let content = item.reel[index] || "";

        if(!content.includes("<br>")){
          content = `<div style="font-size:16px;font-weight:bold">${content}</div>`;
        }

        text.innerHTML = content;
        text.classList.add("show");

        index++;

        if(index >= item.reel.length){
          clearInterval(interval);
          setTimeout(showIntro, 2000);
        }

      },200);

    }

    show();
    interval = setInterval(show, 3500);
  }

  showIntro();
}

</script>

</body>
</html>
