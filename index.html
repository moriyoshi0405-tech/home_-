<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
padding:20px;
}

.grid{
display:grid;
grid-template-columns: repeat(3, 1fr);
gap:12px;
}

.card{
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
border-radius:8px;
}

.title{
font-size:12px;
font-weight:bold;
margin-top:5px;
}

</style>
</head>

<body>

<div class="grid" id="grid"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzQ8_J-Pyj-qC5nq6GRl1VNVRUuGziXYCnPIGJAssycvoCEeIVtvOPlKWTtp6Svg_qd/exec";

fetch(API_URL)
.then(res => res.json())
.then(data => {

  const grid = document.getElementById("grid");

  data.slice(0,6).forEach(item => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${item.image}">
      <div class="title">${item.title}</div>
    `;

    grid.appendChild(div);

  });

});

</script>

</body>
</html>
