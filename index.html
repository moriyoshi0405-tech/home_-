<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
padding:20px;
}

.grid{
display:grid;
grid-template-columns: repeat(3, 1fr);
gap:12px;
}

.card{
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
height:220px;
position:relative;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.cover{
width:70px;
border-radius:6px;
margin-bottom:6px;
}

.title{
font-size:12px;
font-weight:bold;
}

.author{
font-size:10px;
opacity:.6;
margin-bottom:6px;
}

.button{
font-size:10px;
padding:6px 10px;
border-radius:12px;
background:black;
color:white;
text-decoration:none;
margin-top:4px;
display:inline-block;
}

.subbtn{
font-size:9px;
margin-top:4px;
cursor:pointer;
opacity:.7;
}

.text{
font-size:12px;
line-height:1.4;
opacity:0;
transform:translateY(10px);
transition:.5s;
}

.text.show{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<div class="grid" id="grid"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzQ8_J-Pyj-qC5nq6GRl1VNVRUuGziXYCnPIGJAssycvoCEeIVtvOPlKWTtp6Svg_qd/exec";

fetch(API_URL)
.then(res => res.json())
.then(data => {

  const grid = document.getElementById("grid");

  data.slice(0,6).forEach(item => {

    const card = document.createElement("div");
    card.className = "card";

    grid.appendChild(card);

    createReelCard(card, item);

  });

});


// 🎬 カード生成（ここが新設計）
function createReelCard(card, item){

  let index = 0;
  let interval = null;

  // 初期表示
  function showIntro(){

    clearInterval(interval);

    card.innerHTML = `
      <img src="${item.image}" class="cover">
      <div class="title">${item.title}</div>
      <div class="author">${item.author}</div>

      <a href="${item.url}" target="_blank" class="button">
        感想記事を読む
      </a>

      <div class="subbtn">▶ 短い紹介を見る</div>
    `;

    // 再生ボタン
    card.querySelector(".subbtn").onclick = startReel;

  }

  function startReel(){

    const text = document.createElement("div");
    text.className = "text";
    card.innerHTML = "";
    card.appendChild(text);

    index = 0;

    function show(){

      text.classList.remove("show");

      setTimeout(()=>{

        text.innerHTML = item.reel[index] || "";
        text.classList.add("show");

        index++;

        if(index >= item.reel.length){
          clearInterval(interval);
          setTimeout(showIntro, 1500); // 最初に戻る
        }

      },200);

    }

    show();
    interval = setInterval(show, 3000);

  }

  // 初期表示実行
  showIntro();

}

</script>

</body>
</html>
